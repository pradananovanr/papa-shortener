<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Papa Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <!-- Header -->
    <header class="bg-slate-800/50 backdrop-blur border-b border-white/10">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="text-2xl font-bold text-white hover:text-purple-300 transition">🔗 Papa Shortener</a>
                <span class="text-slate-400">|</span>
                <span class="text-purple-300 font-medium">Admin Dashboard</span>
            </div>
            <button onclick="logout()" class="px-4 py-2 bg-red-500/20 border border-red-500/50 rounded-lg text-red-300 hover:bg-red-500/30 transition text-sm">
                🚪 Logout
            </button>
        </div>
    </header>

    <div class="container mx-auto px-4 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white/5 backdrop-blur rounded-xl p-6 border border-white/10">
                <p class="text-slate-400 text-sm mb-1">Total URLs</p>
                <p id="stat-total" class="text-3xl font-bold text-white">-</p>
            </div>
            <div class="bg-white/5 backdrop-blur rounded-xl p-6 border border-white/10">
                <p class="text-slate-400 text-sm mb-1">Active</p>
                <p id="stat-active" class="text-3xl font-bold text-green-400">-</p>
            </div>
            <div class="bg-white/5 backdrop-blur rounded-xl p-6 border border-white/10">
                <p class="text-slate-400 text-sm mb-1">Disabled</p>
                <p id="stat-disabled" class="text-3xl font-bold text-red-400">-</p>
            </div>
        </div>

        <!-- URL List -->
        <div class="bg-white/5 backdrop-blur rounded-xl border border-white/10 overflow-hidden">
            <div class="p-6 border-b border-white/10">
                <h2 class="text-xl font-bold text-white">📋 Daftar URL</h2>
            </div>

            <!-- Error/Success Messages -->
            <div id="message-container" class="p-4"></div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-white/5">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Short URL</th>
                            <th class="px-6 py-4 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Original URL</th>
                            <th class="px-6 py-4 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Type</th>
                            <th class="px-6 py-4 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-4 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Created</th>
                            <th class="px-6 py-4 text-right text-xs font-medium text-slate-400 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="url-table" class="divide-y divide-white/5">
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-slate-500">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-black/70 backdrop-blur hidden items-center justify-center z-50">
        <div class="bg-slate-800 rounded-2xl p-8 w-full max-w-lg mx-4 border border-white/10">
            <h3 class="text-xl font-bold text-white mb-6">✏️ Edit URL</h3>
            
            <form id="edit-form">
                <input type="hidden" id="edit-code">
                
                <div class="mb-4">
                    <label class="block text-slate-300 text-sm mb-2">Short Code</label>
                    <input type="text" id="edit-short" readonly class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-slate-400">
                </div>

                <div class="mb-6">
                    <label class="block text-slate-300 text-sm mb-2">Original URL</label>
                    <input type="url" id="edit-original" required class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="flex gap-4">
                    <button type="button" onclick="closeEditModal()" class="flex-1 py-3 bg-slate-600 rounded-xl text-white font-medium hover:bg-slate-500 transition">
                        Batal
                    </button>
                    <button type="submit" class="flex-1 py-3 bg-gradient-to-r from-primary to-secondary rounded-xl text-white font-bold hover:opacity-90 transition">
                        💾 Simpan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = '/api/admin';
        let token = localStorage.getItem('admin_token');

        // Check auth
        if (!token) {
            window.location.href = '/admin/login';
        }

        function logout() {
            localStorage.removeItem('admin_token');
            window.location.href = '/admin/login';
        }

        async function api(endpoint, options = {}) {
            const res = await fetch(API + endpoint, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                }
            });
            
            if (res.status === 401) {
                logout();
                return null;
            }
            
            return res.json();
        }

        function showMessage(msg, type = 'success') {
            const container = document.getElementById('message-container');
            const bg = type === 'success' ? 'bg-green-500/20 border-green-500/50 text-green-200' : 'bg-red-500/20 border-red-500/50 text-red-200';
            container.innerHTML = `<div class="p-4 ${bg} border rounded-xl text-sm">${msg}</div>`;
            setTimeout(() => container.innerHTML = '', 3000);
        }

        async function loadURLs() {
            const data = await api('/urls');
            if (!data) return;

            const tbody = document.getElementById('url-table');
            
            // Stats
            const total = data.urls ? data.urls.length : 0;
            const active = data.urls ? data.urls.filter(u => u.is_active).length : 0;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-disabled').textContent = total - active;

            if (!data.urls || data.urls.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-slate-500">Belum ada URL</td></tr>';
                return;
            }

            tbody.innerHTML = data.urls.map(url => `
                <tr class="hover:bg-white/5 transition">
                    <td class="px-6 py-4">
                        <a href="/${url.short_code}" class="text-primary hover:underline font-mono">${url.short_code}</a>
                    </td>
                    <td class="px-6 py-4">
                        <span class="text-slate-300 text-sm truncate max-w-xs block" title="${url.original_url}">${url.original_url}</span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-xs ${url.is_custom ? 'bg-purple-500/20 text-purple-300' : 'bg-blue-500/20 text-blue-300'}">
                            ${url.is_custom ? '✨ Custom' : '🎲 Random'}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-xs ${url.is_active ? 'bg-green-500/20 text-green-300' : 'bg-red-500/20 text-red-300'}">
                            ${url.is_active ? '● Active' : '○ Disabled'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-slate-400 text-sm">
                        ${new Date(url.created_at).toLocaleDateString('id-ID')}
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center justify-end gap-2">
                            <button onclick="openEditModal('${url.short_code}', '${url.original_url}')" class="p-2 bg-blue-500/20 hover:bg-blue-500/40 rounded-lg text-blue-300 transition" title="Edit">
                                ✏️
                            </button>
                            <button onclick="toggleURL('${url.short_code}')" class="p-2 ${url.is_active ? 'bg-amber-500/20 hover:bg-amber-500/40 text-amber-300' : 'bg-green-500/20 hover:bg-green-500/40 text-green-300'} rounded-lg transition" title="${url.is_active ? 'Disable' : 'Enable'}">
                                ${url.is_active ? '🔴' : '🟢'}
                            </button>
                            <button onclick="deleteURL('${url.short_code}')" class="p-2 bg-red-500/20 hover:bg-red-500/40 rounded-lg text-red-300 transition" title="Delete">
                                🗑️
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openEditModal(code, original) {
            document.getElementById('edit-code').value = code;
            document.getElementById('edit-short').value = code;
            document.getElementById('edit-original').value = original;
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-modal').classList.add('flex');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            document.getElementById('edit-modal').classList.remove('flex');
        }

        // Edit form submit
        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('edit-code').value;
            const original_url = document.getElementById('edit-original').value;

            const res = await fetch(API + `/urls/${code}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ original_url })
            });

            if (res.ok) {
                showMessage('✅ URL berhasil diupdate!');
                closeEditModal();
                loadURLs();
            } else {
                const data = await res.json();
                showMessage('❌ Gagal update: ' + data.message, 'error');
            }
        });

        async function toggleURL(code) {
            const res = await fetch(API + `/urls/${code}/toggle`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                showMessage('✅ Status URL toggled!');
                loadURLs();
            } else {
                showMessage('❌ Gagal toggle status', 'error');
            }
        }

        async function deleteURL(code) {
            if (!confirm(`Hapus URL "${code}"?`)) return;

            const res = await fetch(API + `/urls/${code}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                showMessage('✅ URL berhasil dihapus!');
                loadURLs();
            } else {
                showMessage('❌ Gagal hapus URL', 'error');
            }
        }

        // Load on start
        loadURLs();
    </script>
</body>
</html>
