<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Papa Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="container mx-auto px-4 py-16">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-bold text-white hover:text-purple-300 transition">🔗 Papa Shortener</a>
            <p class="text-slate-400 mt-2">Admin Panel</p>
        </div>

        <div class="max-w-md mx-auto">
            <div class="bg-white/5 backdrop-blur-lg rounded-2xl shadow-2xl p-8 border border-white/10">
                <h2 class="text-2xl font-bold text-white mb-6 text-center">🔐 Admin Login</h2>

                <div id="error-msg" class="hidden mb-4 p-4 bg-red-500/20 border border-red-500/50 rounded-xl text-red-200 text-sm"></div>

                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-slate-300 font-medium mb-2">Username</label>
                        <input 
                            type="text" 
                            name="username" 
                            id="username"
                            required
                            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                            placeholder="admin"
                        >
                    </div>

                    <div>
                        <label class="block text-slate-300 font-medium mb-2">Password</label>
                        <input 
                            type="password" 
                            name="password" 
                            id="password"
                            required
                            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
                            placeholder="••••••••"
                        >
                    </div>

                    <button 
                        type="submit"
                        id="submit-btn"
                        class="w-full py-4 bg-gradient-to-r from-primary to-secondary rounded-xl text-white font-bold text-lg hover:opacity-90 transition-all duration-200 shadow-lg hover:shadow-xl"
                    >
                        <span id="btn-text">🚀 Login</span>
                        <span id="btn-loading" class="hidden">Loading...</span>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a href="/" class="text-slate-400 hover:text-white text-sm transition">← Kembali ke Home</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset error
            errorMsg.classList.add('hidden');
            
            // Show loading
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            submitBtn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                // Save token
                localStorage.setItem('admin_token', data.token);
                
                // Redirect to dashboard
                window.location.href = '/admin';
            } catch (err) {
                errorMsg.textContent = '❌ ' + err.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
